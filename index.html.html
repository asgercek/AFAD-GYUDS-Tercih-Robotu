<h1>AFAD GYUDS Şube Müdürü Yerleştirme Simülasyonu</h1>

<div class="panel">
<strong>Sistem:</strong> Puan sıralı, kontenjan bazlı deterministik yerleştirme modeli çalışmaktadır.

]</textarea>

<textarea id="adaylar" style="display:none;">[]</textarea>

<script>
let tercihlerDiv = document.getElementById("tercihler");

function init(){
    let kadrolar = JSON.parse(document.getElementById("kadro").value);
    let html = "";
    for(let i=1;i<=15;i++){
        html += `<select id="t${i}"><option value="">Tercih ${i}</option>`;
        kadrolar.forEach(k=>{
            html += `<option value="${k.id}">${k.il}</option>`;
        });
        html += "</select>";
    }
    tercihlerDiv.innerHTML = html;
}

function adayEkle(){
    let isim=document.getElementById("isim").value;
    let puan=parseFloat(document.getElementById("puan").value);
    let tercihler=[];

    for(let i=1;i<=15;i++){
        let v=document.getElementById("t"+i).value;
        if(v)tercihler.push(v);
    }

    let arr=JSON.parse(document.getElementById("adaylar").value);
    arr.push({isim,puan,tercihler});
    document.getElementById("adaylar").value=JSON.stringify(arr);

    alert("Aday eklendi");
}

function calistir(){
    let kadrolar=JSON.parse(document.getElementById("kadro").value);
    let adaylar=JSON.parse(document.getElementById("adaylar").value);

    let map={};
    kadrolar.forEach(k=>map[k.id]={...k,kalan:k.kontenjan});

    adaylar.sort((a,b)=>b.puan-a.puan);

    let sonuc=[];

    adaylar.forEach(a=>{
        let durum=false;
        let il="";
        let tercih=0;

        for(let i=0;i<a.tercihler.length;i++){
            let k=map[a.tercihler[i]];
            if(k && k.kalan>0){
                k.kalan--;
                durum=true;
                il=k.il;
                tercih=i+1;
                break;
            }
        }

        sonuc.push({a,durum,il,tercih});
    });

    let html="";
    sonuc.forEach((s,i)=>{
        html+=`<tr class="${s.durum?'good':'bad'}">
        <td>${i+1}</td>
        <td>${s.a.isim}</td>
        <td>${s.a.puan}</td>
        <td>${s.il||'-'}</td>
        <td>${s.durum?'Yerleşti':'Yerleşemedi'}</td>
        <td>${s.tercih||'-'}</td>
        </tr>`;
    });

    document.getElementById("sonuc").innerHTML=html;

    let total=sonuc.length;
    let ok=sonuc.filter(x=>x.durum).length;

    document.getElementById("istatistik").innerHTML=
    `Toplam Aday: ${total} | Yerleşen: ${ok} | Boşta: ${total-ok}`;
}

window.onload=init;
</script>
